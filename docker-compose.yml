services:
  postgres:
    image: postgres:18-alpine
    container_name: accsaber-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - accsaber-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accsaber-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      COMPLEXITY_AP_TARGET: ${COMPLEXITY_AP_TARGET}
      COMPLEXITY_ACCURACY_SHIFT: ${COMPLEXITY_ACCURACY_SHIFT}
      COMPLEXITY_TRANSFORM_OFFSET: ${COMPLEXITY_TRANSFORM_OFFSET}
      COMPLEXITY_TRANSFORM_SCALE: ${COMPLEXITY_TRANSFORM_SCALE}
      COMPLEXITY_TRANSFORM_BASE: ${COMPLEXITY_TRANSFORM_BASE}
      CRITERIA_CHECKER_URL: http://criteria-checker:8000
      DISCORD_OAUTH_CLIENT_ID: ${DISCORD_OAUTH_CLIENT_ID}
      DISCORD_OAUTH_CLIENT_SECRET: ${DISCORD_OAUTH_CLIENT_SECRET}
      DISCORD_OAUTH_REDIRECT_URI: ${DISCORD_OAUTH_REDIRECT_URI}
      BEATLEADER_OAUTH_CLIENT_ID: ${BEATLEADER_OAUTH_CLIENT_ID}
      BEATLEADER_OAUTH_CLIENT_SECRET: ${BEATLEADER_OAUTH_CLIENT_SECRET}
      BEATLEADER_OAUTH_REDIRECT_URI: ${BEATLEADER_OAUTH_REDIRECT_URI}
      STEAM_OPENID_REALM: ${STEAM_OPENID_REALM}
      STEAM_OPENID_RETURN_TO: ${STEAM_OPENID_RETURN_TO}
      OAUTH_ALLOWED_RETURN_ORIGINS: ${OAUTH_ALLOWED_RETURN_ORIGINS}
    depends_on:
      - postgres
    networks:
      - accsaber-network

  criteria-checker:
    profiles:
      - criteria
    build:
      context: ../../accsaber-criteria-script
      dockerfile: Dockerfile
    container_name: accsaber-criteria-checker
    ports:
      - "8001:8000"
    networks:
      - accsaber-network

  prometheus:
    image: prom/prometheus:latest
    container_name: accsaber-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - accsaber-network

  grafana:
    image: grafana/grafana:latest
    container_name: accsaber-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - accsaber-network

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  accsaber-network:
    driver: bridge
