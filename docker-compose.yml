services:
  postgres:
    image: postgres:18-alpine
    container_name: accsaber-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - accsaber-network

  ai-complexity:
    image: ${AI_COMPLEXITY_IMAGE:-accsaber-ai-complexity:latest}
    container_name: accsaber-ai-complexity
    volumes:
      - ai-complexity-maps:/home/maps
      - ai-complexity-cache:/app/cache-and-stuff
    networks:
      - accsaber-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accsaber-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      AI_COMPLEXITY_URL: http://ai-complexity:8000
    depends_on:
      - postgres
    networks:
      - accsaber-network

  prometheus:
    image: prom/prometheus:latest
    container_name: accsaber-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - accsaber-network

  grafana:
    image: grafana/grafana:latest
    container_name: accsaber-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - accsaber-network

volumes:
  postgres-data:
  ai-complexity-maps:
  ai-complexity-cache:
  prometheus-data:
  grafana-data:

networks:
  accsaber-network:
    driver: bridge
