modules:
  http_2xx:
    prober: http
    timeout: 15s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      fail_if_ssl: false
      fail_if_not_ssl: false
      enable_http2: true

  http_2xx_plain:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_http_versions: ["HTTP/1.1"]
      valid_status_codes: [200]
      fail_if_ssl: true
      fail_if_not_ssl: false
