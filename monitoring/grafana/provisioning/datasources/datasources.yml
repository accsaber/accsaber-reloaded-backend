apiVersion: 1

datasources:
  - name: Prometheus
    uid: accsaber-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    uid: accsaber-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: $POSTGRES_USER
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      database: $POSTGRES_DB
      sslmode: disable
      maxOpenConns: 2
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
    editable: true
