spring:
  application:
    name: accsaber-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/accsaber}
    username: ${SPRING_DATASOURCE_USERNAME:accsaber}
    password: ${SPRING_DATASOURCE_PASSWORD:accsaber}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true
        "[default_batch_fetch_size]": 25

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null

  web:
    error:
      include-message: always
      include-binding-errors: always

server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      internal-proxies: "10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]\\.\\d{1,3}\\.\\d{1,3}|172\\.2[0-9]\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}"
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized

springdoc:
  swagger-ui:
    path: /v1/docs
  api-docs:
    path: /v1/api-docs

accsaber:
  voting:
    qualify-threshold: 3
    reweight-threshold: 3
    unrank-threshold: 3
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: 86400
    refresh-token-ttl: 2592000
    player-access-token-ttl: 604800
    player-refresh-token-ttl: 2592000
  service:
    api-key: ${SERVICE_API_KEY}
  platforms:
    beatleader:
      base-url: https://api.beatleader.com
      websocket-url: wss://sockets.api.beatleader.com/scores
      timeout-ms: 20000
      max-retries: 3
    scoresaber:
      base-url: https://scoresaber.com/api
      websocket-url: wss://scoresaber.com/ws
      timeout-ms: 20000
      max-retries: 3
    beatsaver:
      base-url: https://api.beatsaver.com
      timeout-ms: 10000
      max-retries: 3
    ss-wait-for-bl-seconds: 30
    gap-fill-window-seconds: 300
    ws-reconnect-interval-ms: 10000
    ws-max-reconnect-interval-ms: 60000
  xp:
    base-xp-per-score: 25
    max-bonus-xp-per-score: 900
    improvement-multiplier: 1.5
  backfill:
    on-startup: true
    startup-mode: gap-fill # full | gap-fill
    gap-fill-days: 2
    gap-fill-page-delay-ms: 125
  complexity-estimate:
    ap-target: ${COMPLEXITY_AP_TARGET}
    accuracy-shift: ${COMPLEXITY_ACCURACY_SHIFT}
    transform-offset: ${COMPLEXITY_TRANSFORM_OFFSET}
    transform-scale: ${COMPLEXITY_TRANSFORM_SCALE}
    transform-base: ${COMPLEXITY_TRANSFORM_BASE}
  rate-limit:
    capacity: 400
    window-seconds: 60
    trusted-ips: ${RATE_LIMIT_TRUSTED_IPS:}
  skill:
    rank-weight: 0.70
    combined-weight: 0.30
    rank-curve-exponent: 0.5
    sustained-center: 750
    sustained-spread: 90
    peak-center: 850
    peak-spread: 90
  scheduler:
    player-refresh-cron: "0 0 4 * * *"
  criteria-checker:
    base-url: ${CRITERIA_CHECKER_URL:http://criteria-checker:8000}
    timeout-ms: 60000
  oauth:
    state-ttl-seconds: 600
    pending-link-ttl-seconds: 900
    allowed-return-origins: ${OAUTH_ALLOWED_RETURN_ORIGINS:}
    discord:
      client-id: ${DISCORD_OAUTH_CLIENT_ID:}
      client-secret: ${DISCORD_OAUTH_CLIENT_SECRET:}
      authorize-url: https://discord.com/oauth2/authorize
      token-url: https://discord.com/api/oauth2/token
      user-info-url: https://discord.com/api/users/@me
      redirect-uri: ${DISCORD_OAUTH_REDIRECT_URI:}
      scope: identify
    beatleader:
      client-id: ${BEATLEADER_OAUTH_CLIENT_ID:}
      client-secret: ${BEATLEADER_OAUTH_CLIENT_SECRET:}
      authorize-url: https://api.beatleader.com/oauth2/authorize
      token-url: https://api.beatleader.com/oauth2/token
      user-info-url: https://api.beatleader.com/oauth2/identity
      redirect-uri: ${BEATLEADER_OAUTH_REDIRECT_URI:}
      scope: profile
    steam:
      realm: ${STEAM_OPENID_REALM:}
      return-to: ${STEAM_OPENID_RETURN_TO:}

logging:
  level:
    root: INFO
    "[com.accsaber]": INFO
    "[org.springframework.security]": INFO
