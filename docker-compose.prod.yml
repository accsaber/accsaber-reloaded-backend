services:
  postgres:
    image: postgres:18-alpine
    container_name: accsaber-postgres
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=5GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_connections=50
      - -c
      - random_page_cost=1.1
      - -c
      - synchronous_commit=off
      - -c
      - autovacuum_vacuum_cost_delay=10ms
      - -c
      - autovacuum_vacuum_cost_limit=600
      - -c
      - autovacuum_max_workers=2
      - -c
      - autovacuum_naptime=30s
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accsaber-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      COMPLEXITY_AP_TARGET: ${COMPLEXITY_AP_TARGET}
      COMPLEXITY_ACCURACY_SHIFT: ${COMPLEXITY_ACCURACY_SHIFT}
      COMPLEXITY_TRANSFORM_OFFSET: ${COMPLEXITY_TRANSFORM_OFFSET}
      COMPLEXITY_TRANSFORM_SCALE: ${COMPLEXITY_TRANSFORM_SCALE}
      COMPLEXITY_TRANSFORM_BASE: ${COMPLEXITY_TRANSFORM_BASE}
      CRITERIA_CHECKER_URL: http://criteria-checker:8000
      DISCORD_OAUTH_CLIENT_ID: ${DISCORD_OAUTH_CLIENT_ID}
      DISCORD_OAUTH_CLIENT_SECRET: ${DISCORD_OAUTH_CLIENT_SECRET}
      DISCORD_OAUTH_REDIRECT_URI: ${DISCORD_OAUTH_REDIRECT_URI}
      BEATLEADER_OAUTH_CLIENT_ID: ${BEATLEADER_OAUTH_CLIENT_ID}
      BEATLEADER_OAUTH_CLIENT_SECRET: ${BEATLEADER_OAUTH_CLIENT_SECRET}
      BEATLEADER_OAUTH_REDIRECT_URI: ${BEATLEADER_OAUTH_REDIRECT_URI}
      STEAM_OPENID_REALM: ${STEAM_OPENID_REALM}
      STEAM_OPENID_RETURN_TO: ${STEAM_OPENID_RETURN_TO}
      OAUTH_ALLOWED_RETURN_ORIGINS: ${OAUTH_ALLOWED_RETURN_ORIGINS}
      CDN_STORAGE_PATH: /var/cdn
      CDN_BASE_URL: ${CDN_BASE_URL}
      JAVA_OPTS: -Xms256m -Xmx768m
    volumes:
      - cdn-data:/var/cdn
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/health/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  cdn:
    build:
      context: .
      dockerfile: docker/Dockerfile.cdn
    container_name: accsaber-cdn
    volumes:
      - cdn-data:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
  criteria-checker:
    image: ghcr.io/tikugato/accsaber-criteria-script:latest
    pull_policy: always
    container_name: accsaber-criteria-checker
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=3).status==200 else 1)' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
  prometheus:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.prometheus
    container_name: accsaber-prometheus
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      - blackbox-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
  blackbox-exporter:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.blackbox
    container_name: accsaber-blackbox-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9115/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
  grafana:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.grafana
    container_name: accsaber-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  cdn-data:
