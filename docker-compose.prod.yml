services:
  postgres:
    image: postgres:18-alpine
    container_name: accsaber-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accsaber-network

  ai-complexity:
    image: ${AI_COMPLEXITY_IMAGE:-accsaber-ai-complexity:latest}
    container_name: accsaber-ai-complexity
    volumes:
      - ai-complexity-maps:/home/maps
      - ai-complexity-cache:/app/cache-and-stuff
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - accsaber-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accsaber-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      AI_COMPLEXITY_URL: http://ai-complexity:8000
      JAVA_OPTS: -Xms256m -Xmx768m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/health/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - accsaber-network

  prometheus:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.prometheus
    container_name: accsaber-prometheus
    volumes:
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - accsaber-network

  grafana:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.grafana
    container_name: accsaber-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - accsaber-network

volumes:
  postgres-data:
  ai-complexity-maps:
  ai-complexity-cache:
  prometheus-data:
  grafana-data:

networks:
  accsaber-network:
    driver: bridge
